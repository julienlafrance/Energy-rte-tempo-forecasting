id: mqtt_linky_silver
namespace: projet705
description: |
  Silver layer transformation for Linky data.
  Called as a subflow by mqtt_linky_ingest — upserts energy data via
  the dbt_silver.upsert_linky_energy stored procedure.

inputs:
  - id: metric
    type: STRING
    required: true

  - id: payload
    type: STRING
    required: true

tasks:
  - id: upsert_silver
    type: io.kestra.plugin.jdbc.postgresql.Query
    sql: |
      CALL dbt_silver.upsert_linky_energy(
        '{{ inputs.metric }}',
        {{ inputs.payload }}
      )

pluginDefaults:
  - type: io.kestra.plugin.jdbc.postgresql.Query
    values:
      url: "{{ kv('PG_JDBC') }}"
      username: "{{ kv('PG_USER') }}"
      password: "{{ kv('PG_PASS') }}"