id: mqtt_linky_ingest
namespace: projet705
description: |
  Ingests real-time Linky sensor data from MQTT into the bronze layer (raw.linky),
  then triggers the silver transformation subflow.

tasks:
  - id: insert_bronze
    type: io.kestra.plugin.jdbc.postgresql.Query
    sql: |
      INSERT INTO raw.linky (metric, value)
      VALUES (
        '{{ trigger.topic | replace({"linky/sensor/lixee_zlinky_tic_": "", "/state": ""}) }}',
        {{ trigger.payload }}
      )

  - id: call_silver
    type: io.kestra.plugin.core.flow.Subflow
    namespace: projet705
    flowId: mqtt_linky_silver
    inputs:
      metric: "{{ trigger.topic | replace({'linky/sensor/lixee_zlinky_tic_': '', '/state': ''}) }}"
      payload: "{{ trigger.payload }}"
    wait: false

triggers:
  - id: linky_trigger
    type: io.kestra.plugin.mqtt.RealtimeTrigger
    server: "{{ kv('MQTT_SERVER') }}"
    clientId: kestra-linky-ingest
    username: "{{ kv('MQTT_USERNAME') }}"
    password: "{{ kv('MQTT_PASSWORD') }}"
    topic:
      - linky/sensor/+/state
    serdeType: STRING

pluginDefaults:
  - type: io.kestra.plugin.jdbc.postgresql.Query
    values:
      url: "{{ kv('PG_JDBC') }}"
      username: "{{ kv('PG_USER') }}"
      password: "{{ kv('PG_PASS') }}"