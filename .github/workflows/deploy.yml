name: deploy-prod

# ─── CD Production ───────────────────────────────────────────────
# Triggered when code is promoted to the `prod` branch, or manually.
# `main` is the integration branch (validated by CI).
# `prod` is the production branch (deployed by this workflow).
#
# The entire PROD release is treated as a single unit:
#   sync → deploy Kestra → smoke tests (Kestra + apps) → rollback on failure
# This guarantees that any failure triggers a rollback, including
# app smoke test failures.
on:
  push:
    branches: [prod]
    paths:
      - '10-flows/prod/**'
      - '140-sql/queries/**'
      - '100-scripts_mlops/**'
      - '110-api/**'
      - '120-webapp/**'
  workflow_dispatch:

env:
  # Source of truth: 95-ci-cd/config/repo_structure.yaml
  KESTRA_NAMESPACE: projet713
  KESTRA_SERVER: http://localhost:30082
  SYNC_TARGET: /home/dataia25/projet
  FLOWS_DIR: 10-flows/prod
  SQL_DIR: 140-sql
  SCRIPTS_DIR: 100-scripts_mlops
  API_DIR: 110-api
  WEBAPP_DIR: 120-webapp

jobs:
  deploy:
    name: Deploy to production
    runs-on: [self-hosted, prod]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Print deployment context
        run: |
          echo "──────────────────────────────────────"
          echo "Branch:    $GITHUB_REF_NAME"
          echo "Commit:    $GITHUB_SHA"
          echo "Runner:    $(hostname)"
          echo "Date:      $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Namespace: $KESTRA_NAMESPACE"
          echo "Server:    $KESTRA_SERVER"
          echo "──────────────────────────────────────"

      # ─── Filesystem sync (non-destructive) ────────────────────────
      # rsync WITHOUT --delete: updates existing files and adds
      # missing ones, but never removes files already on the VM.
      #
      # The list of directories is read from repo_structure.yaml
      # (sync.directories) — single source of truth.
      - name: Sync versioned files to PROD VM
        run: |
          echo "── Syncing versioned files to PROD VM ──"
          SYNC_DIRS=$(python3 -c "
          import yaml
          cfg = yaml.safe_load(open('95-ci-cd/config/repo_structure.yaml'))
          print(' '.join(cfg['sync']['directories']))
          ")
          SYNCED=0
          for dir in $SYNC_DIRS; do
            if [ -d "$dir" ]; then
              mkdir -p "$SYNC_TARGET/$dir"
              rsync --archive --compress --verbose "$dir/" "$SYNC_TARGET/$dir/"
              echo "  ✓ $dir → $SYNC_TARGET/$dir"
              SYNCED=$((SYNCED + 1))
            else
              echo "  ⚠️  $dir not found in workspace — skipped"
            fi
          done
          echo "$SYNCED directory(ies) synchronized."

      # ─── Deploy namespace files BEFORE flows ───────────────────────
      # Non-destructive: only creates/updates files present in Git.
      # Files already on Kestra but absent from Git are left untouched.
      - name: Deploy namespace files (SQL)
        uses: kestra-io/deploy-action@master
        with:
          namespace: ${{ env.KESTRA_NAMESPACE }}
          directory: ./${{ env.SQL_DIR }}
          resource: namespace_file
          server: ${{ env.KESTRA_SERVER }}
          user: ${{ secrets.KESTRA_ADMIN_USER }}
          password: ${{ secrets.KESTRA_ADMIN_PASS }}

      # ─── Validate flows ────────────────────────────────────────────
      - name: Validate flows
        uses: kestra-io/validate-action@master
        with:
          directory: ./${{ env.FLOWS_DIR }}
          resource: flow
          server: ${{ env.KESTRA_SERVER }}
          user: ${{ secrets.KESTRA_ADMIN_USER }}
          password: ${{ secrets.KESTRA_ADMIN_PASS }}

      # ─── Deploy flows ──────────────────────────────────────────────
      # Non-destructive: delete=false ensures flows present on Kestra
      # but absent from Git are NOT removed.
      - name: Deploy flows
        uses: kestra-io/deploy-action@master
        with:
          namespace: ${{ env.KESTRA_NAMESPACE }}
          directory: ./${{ env.FLOWS_DIR }}
          resource: flow
          server: ${{ env.KESTRA_SERVER }}
          user: ${{ secrets.KESTRA_ADMIN_USER }}
          password: ${{ secrets.KESTRA_ADMIN_PASS }}
          delete: false

      # ─── Smoke tests: Kestra ───────────────────────────────────────
      # Configuration: 95-ci-cd/config/deploy_smoke_tests.yaml
      # Script:        95-ci-cd/deploy/smoke_test_prod.py
      - name: Smoke test — Kestra PROD
        env:
          KESTRA_USER: ${{ secrets.KESTRA_ADMIN_USER }}
          KESTRA_PASS: ${{ secrets.KESTRA_ADMIN_PASS }}
        run: python3 95-ci-cd/deploy/smoke_test_prod.py

      # ─── Smoke tests: API + Webapp ─────────────────────────────────
      # Verifies that app services are healthy after the release.
      # If this fails, rollback is triggered (same job).
      # Configuration: 95-ci-cd/config/deploy_apps_smoke_tests.yaml
      - name: Smoke test — PROD app endpoints
        run: python3 95-ci-cd/deploy/smoke_test_apps.py --env prod

      # ─── Notification: success ─────────────────────────────────────
      - name: Notify Discord — success
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ Deploy PROD — Succès\",\"description\":\"Commit \`${{ github.sha }}\` déployé sur namespace $KESTRA_NAMESPACE. Tous les smoke tests passent (Kestra + apps).\",\"color\":3066993}]}" || true

      # ─── Rollback on failure ───────────────────────────────────────
      # Triggered if ANY previous step fails (sync, deploy, or
      # smoke tests — including app health checks).
      # Uses git ls-tree + git show to enumerate and restore ALL files
      # from HEAD~1, including files deleted between commits.
      # Non-destructive: only re-deploys Git-tracked resources.
      - name: Rollback on failure
        if: failure()
        env:
          KESTRA_USER: ${{ secrets.KESTRA_ADMIN_USER }}
          KESTRA_PASS: ${{ secrets.KESTRA_ADMIN_PASS }}
        run: |
          echo "⚠️  Deployment failed — rolling back to previous commit"
          bash 95-ci-cd/deploy/rollback_prod.sh

      - name: Notify Discord — failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ Deploy PROD — ÉCHEC + ROLLBACK\",\"description\":\"Commit \`${{ github.sha }}\` a échoué. Rollback effectué.\",\"color\":15158332}]}" || true
