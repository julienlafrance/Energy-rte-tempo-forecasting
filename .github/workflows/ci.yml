name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, debug]

env:
  # Source of truth: 95-ci-cd/config/repo_structure.yaml
  FLOWS_DIR: 10-flows/prod
  SQL_DIR: 140-sql
  SCRIPTS_DIR: 100-scripts_mlops
  API_DIR: 110-api
  WEBAPP_DIR: 120-webapp
  KESTRA_DEV_SERVER: http://localhost:8082

jobs:
  # ─── Job 1 : Static validation (no server dependency) ─────────────
  # Runs on GitHub-hosted runner. Validates code and config
  # without requiring any live service.
  lint-and-test:
    name: Static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install CI dependencies
        run: uv sync --extra ci

      # ── Code & config validation ─────────────────────────────────
      - name: Lint YAML flows
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: disable, comments-indentation: disable}}' \
            "$FLOWS_DIR/"

      - name: Check SQL files readable
        run: |
          echo "Checking SQL files in $SQL_DIR/queries/ ..."
          for f in $SQL_DIR/queries/*.sql; do
            python3 -c "open('$f').read()" || { echo "❌ Cannot read $f"; exit 1; }
            echo "  ✓ $f"
          done

      - name: Check flow scripts (syntax)
        run: |
          echo "Checking Python scripts in $SCRIPTS_DIR/ ..."
          FOUND=0
          for f in $(find "$SCRIPTS_DIR/" -name '*.py' \
                    -not -path '*/__pycache__/*' | sort); do
            python3 -m py_compile "$f" || { echo "❌ Syntax error in $f"; exit 1; }
            echo "  ✓ $f"
            FOUND=$((FOUND + 1))
          done
          echo "$FOUND flow script(s) validated."

      - name: Check API source (syntax)
        run: |
          echo "Checking Python files in $API_DIR/ ..."
          FOUND=0
          for f in $(find "$API_DIR" -name '*.py' -not -path '*/__pycache__/*' | sort); do
            python3 -m py_compile "$f" || { echo "❌ Syntax error in $f"; exit 1; }
            echo "  ✓ $f"
            FOUND=$((FOUND + 1))
          done
          echo "$FOUND API file(s) validated."

      - name: Check webapp source (syntax)
        run: |
          echo "Checking Python files in $WEBAPP_DIR/ ..."
          FOUND=0
          for f in $(find "$WEBAPP_DIR" -name '*.py' -not -path '*/__pycache__/*' | sort); do
            python3 -m py_compile "$f" || { echo "❌ Syntax error in $f"; exit 1; }
            echo "  ✓ $f"
            FOUND=$((FOUND + 1))
          done
          echo "$FOUND webapp file(s) validated."

      - name: Validate flows (check_flows.py)
        run: uv run python 95-ci-cd/ci/check_flows.py "$FLOWS_DIR"

      - name: Run unit tests
        run: uv run pytest 130-tests/ -v

  # ─── Job 2 : DEV integration validation (self-hosted DEV runner) ──
  # Validates components against services already running on the
  # DEV VM (705). Does NOT deploy anything.
  validate-dev:
    name: Validate on DEV
    needs: lint-and-test
    runs-on: [self-hosted, dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify kestractl is installed
        run: |
          command -v kestractl >/dev/null || { echo "❌ kestractl not found on this runner"; exit 1; }
          echo "kestractl found at $(command -v kestractl)"

      - name: Debug workspace
        run: |
          echo "PWD=$(pwd)"
          echo "GITHUB_SHA=$GITHUB_SHA"
          git rev-parse HEAD
          ls -la
          ls -la "$FLOWS_DIR"

      - name: Show validated flow files
        run: |
          for f in "$FLOWS_DIR"/*.yaml "$FLOWS_DIR"/*.yml; do
            [ -f "$f" ] || continue
            echo "===== $f ====="
            sed -n '1,120p' "$f"
            echo
          done

      - name: Validate flows against Kestra DEV
        env:
          KESTRA_USER: ${{ secrets.KESTRA_ADMIN_USER }}
          KESTRA_PASS: ${{ secrets.KESTRA_ADMIN_PASS }}
        run: |
          for f in "$FLOWS_DIR"/*.yaml "$FLOWS_DIR"/*.yml; do
            [ -f "$f" ] || continue
            echo "Validating $f"
            kestractl flows validate "$f" \
              --host "$KESTRA_DEV_SERVER" \
              --username "$KESTRA_USER" \
              --password "$KESTRA_PASS"
          done

      # Health checks on services already deployed in DEV via Docker Compose.
      # Configuration: 95-ci-cd/config/deploy_apps_smoke_tests.yaml (dev section)
      - name: Smoke test — DEV app endpoints
        run: python3 95-ci-cd/deploy/smoke_test_apps.py --env dev
