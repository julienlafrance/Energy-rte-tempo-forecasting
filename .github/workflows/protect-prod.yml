name: protect-prod

# ─── Promotion guard ─────────────────────────────────────────────
# Ensures that only `main` can be merged into `prod`.
# This workflow is meant to be a required status check on the
# `prod` branch protection rule.
on:
  pull_request:
    branches: [prod]

jobs:
  check-source-branch:
    name: Verify PR source is main
    runs-on: ubuntu-latest

    steps:
      - name: Check source branch
        run: |
          echo "PR source branch: ${{ github.head_ref }}"
          echo "PR target branch: ${{ github.base_ref }}"
          if [ "${{ github.head_ref }}" != "main" ]; then
            echo "❌ Only 'main' can be merged into 'prod'."
            echo "   This PR comes from '${{ github.head_ref }}'."
            exit 1
          fi
          echo "✅ Source branch is 'main' — promotion authorized."
