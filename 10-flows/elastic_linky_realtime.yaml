id: elastic_linky_realtime
namespace: projet705
inputs:
- id: metric
  type: STRING
  required: true
- id: value
  type: STRING
  required: true
tasks:
- id: check_metric
  type: io.kestra.plugin.core.flow.If
  condition: "{{ inputs.metric == 'apparent_power' }}"
  then:
  - id: index_power
    type: io.kestra.plugin.core.http.Request
    uri: "{{ kv('ES_URL') }}/index_linky-realtime/_doc"
    method: POST
    body: |-
      {
        "timestamp": "{{ now() }}",
        "power_va": {{ inputs.value }}
      }
    headers: "{\"Authorization\":\"Basic {{ kv('ES_BASIC_AUTH') }}\"}"
    options:
      followRedirects: "true"
      allowFailed: "false"
      defaultCharset: UTF-8
